# nfpm packaging config for tgcurl — produces .rpm and .deb from the
# prebuilt (dynamically linked) binary. See https://nfpm.goreleaser.com/configuration/
#
# Driven by the Makefile `release` target, which sets VERSION and BIN.
name: tgcurl
arch: amd64
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: Blokhin Dmitriy <dblokhin79@gmail.com>
description: |
  curl for Telegram — a deterministic, JSON-only command-line client for a
  personal Telegram account (not a bot), built on Telegram's official TDLib.
  Designed to be driven by scripts and AI agents.
vendor: Blokhin Dmitriy
homepage: https://github.com/dblokhin/tgcurl
license: MIT

contents:
  # Path is relative to the repo root (where `make release` runs nfpm); nfpm
  # does not expand env vars inside contents.src, so this is a literal path.
  - src: build/tgcurl
    dst: /usr/bin/tgcurl
    file_info:
      mode: 0755
  - src: ./LICENSE
    dst: /usr/share/doc/tgcurl/LICENSE
  - src: ./README.md
    dst: /usr/share/doc/tgcurl/README.md

# The binary links TDLib, OpenSSL, zlib and libstdc++ dynamically (Fedora's
# tdlib package ships only shared libs — there is no static TDLib client
# archive to bundle). So the package must pull those runtimes in on install.
# Package names differ between RPM and DEB worlds, so declare each per-packager.
overrides:
  rpm:
    depends:
      - tdlib          # provides libtdclient.so / libtdapi.so
      - openssl-libs   # libssl.so.3 / libcrypto.so.3
      - zlib-ng-compat # libz.so.1 (Fedora 40+; older Fedora: zlib)
      - libstdc++      # libstdc++.so.6
  deb:
    depends:
      - libssl3        # libssl.so.3 / libcrypto.so.3
      - zlib1g         # libz.so.1
      - libstdc++6     # libstdc++.so.6
    # NOTE: Debian/Ubuntu have no standard TDLib runtime package. On those
    # systems TDLib must be installed separately (distro package if available,
    # or built from source). We therefore do not name a TDLib dependency here;
    # revisit if targeting a distro that packages it.
